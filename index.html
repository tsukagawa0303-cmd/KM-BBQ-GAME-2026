<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中秋夯霸！高名祝您中秋節快樂！</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #phone-container {
            width: 375px;
            height: 700px;
            background-color: #2c3e50;
            border: 8px solid #34495e;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 1. 頂部夜空區 */
        .sky-zone {
            height: 140px;
            background-image: url('img/sky_bg.png'); 
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .moon {
            width: 60px;
            height: 60px;
            background-image: url('img/moon.png'); 
            background-size: cover;
            position: absolute;
            top: 15px;
            z-index: 1;
        }
        #level-title { margin: 0; font-size: 18px; color: #f39c12; z-index: 2; margin-top: 50px; font-weight: bold; text-shadow: 1px 1px 3px #000;}
        #score-box { font-size: 15px; color: #fff; z-index: 2; margin-top: 2px; text-shadow: 1px 1px 3px #000;}

        /* 2. 中部 KID 角色區 */
        .character-zone {
            height: 150px;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #kid-character {
            width: 140px; 
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        #kid-character img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }
        #game-state {
            position: absolute;
            bottom: 5px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
            z-index: 3;
        }

        /* 3. 中下部：烤網區 */
        .grill-zone {
            height: 260px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('img/grill_bg.png'); 
            background-size: cover;
            background-position: center;
        }
        .grill-floor {
            flex: 1;
            background-image: url('img/grill_mesh.png'); 
            background-size: cover;
            border: 3px solid #7f8c8d;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
        }
        .floor-label {
            position: absolute;
            left: 8px;
            top: 4px;
            font-size: 11px;
            color: #bdc3c7;
            background: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 3px;
            z-index: 2;
        }

        /* 食材插槽 */
        .slot {
            width: 75px;
            height: 65px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .meat {
            width: 70px;
            height: 45px;
            border-radius: 6px;
            display: none; 
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            transition: all 0.1s;
            z-index: 5;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .meat.active-pulse {
            transform: scale(1.2);
        }
        
        /* 夾子插槽 */
        .tongs {
            width: 75px;
            height: 65px;
            position: absolute;
            z-index: 10;
            display: none;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 4. 底部操作區 */
        .control-zone {
            flex: 1;
            background-color: #1e272e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-top: 5px solid #e67e22;
        }
        #grill-btn {
            width: 80%;
            height: 55px;
            background-color: #e74c3c;
            color: white;
            border: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #c0392b;
            touch-action: manipulation;
        }
        #grill-btn:active {
            box-shadow: 0 1px 0 #c0392b;
            transform: translateY(4px);
        }
        #grill-btn:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 5px 0 #95a5a6;
        }
        #restart-btn {
            background: none;
            border: 1px solid #7f8c8d;
            color: #7f8c8d;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        #rating-display {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 2px 6px rgba(0,0,0,0.9);
        }
        .Excellent { color: #f1c40f; }
        .Great { color: #2ecc71; }
        .Good { color: #3498db; }
        .Miss { color: #e74c3c; }
    </style>
</head>
<body>

<div id="phone-container">
    <div class="sky-zone">
        <div class="moon"></div>
        <div id="level-title">Level 1: 鮮嫩豬五花</div>
        <div id="score-box">得分: <span id="total-score">0</span></div>
    </div>

    <div class="character-zone">
        <div id="kid-character">
            <img id="kid-img" src="img/kid_idle.png" alt="童軍公仔">
        </div>
        <div id="game-state">點擊下方按鈕載入音效...</div>
    </div>

    <div id="rating-display"></div>

    <div class="grill-zone">
        <div class="grill-floor">
            <div class="floor-label">上半網 (第 1, 2 拍點)</div>
            <div class="slot">
                <div class="meat" id="meat-0"></div>
                <div class="tongs" id="tongs-0"></div>
            </div>
            <div class="slot">
                <div class="meat" id="meat-1"></div>
                <div class="tongs" id="tongs-1"></div>
            </div>
        </div>
        
        <div class="grill-floor">
            <div class="floor-label">下半網 (第 3, 4 拍點)</div>
            <div class="slot">
                <div class="meat" id="meat-2"></div>
                <div class="tongs" id="tongs-2"></div>
            </div>
            <div class="slot">
                <div class="meat" id="meat-3"></div>
                <div class="tongs" id="tongs-3"></div>
            </div>
        </div>
    </div>

    <div class="control-zone">
        <button id="grill-btn">初始化音效</button>
        <button id="restart-btn">🔄 重新開始</button>
    </div>
</div>

<script>
const levels = [
    { name: "Level 1: 鮮嫩豬五花", bpm: 120, pattern: [1, 2, 3, 4], imgRaw: "img/meat1_raw.png", imgCooked: "img/meat1_cooked.png", imgBurnt: "img/meat1_burnt.png" },
    { name: "Level 2: 醬汁香腸",   bpm: 120, pattern: [1, 1.5, 3, 3.5], imgRaw: "img/meat2_raw.png", imgCooked: "img/meat2_cooked.png", imgBurnt: "img/meat2_burnt.png" },
    { name: "Level 3: 彈牙鮮蝦",   bpm: 120, pattern: [1, 2, 2.66, 3.33], imgRaw: "img/meat3_raw.png", imgCooked: "img/meat3_cooked.png", imgBurnt: "img/meat3_burnt.png" },
    { name: "Level 4: 豪華和牛",   bpm: 120, pattern: [1, 3, 3.5, 4], imgRaw: "img/meat4_raw.png", imgCooked: "img/meat4_cooked.png", imgBurnt: "img/meat4_burnt.png" }
];

let currentLevelIdx = 0;
let score = 0;
let startTime = 0;
let targetTimestamps = [];
let playerClicksCount = 0;
let isListening = false;
let isPlaying = false;
let beatDuration = 0;
let missedCheckTimers = [];

let audioCtx = null;
let soundBuffers = { spawn: null, cue: null, hit: null };
let audioLoaded = false;

async function loadSound(url) {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return await audioCtx.decodeAudioData(arrayBuffer);
}

async function initAudioEngine() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById("game-state").innerText = "⏳ 正在載入音效檔...";
    
    try {
        soundBuffers.spawn = await loadSound('img/sound_spawn.mp3');
        soundBuffers.cue = await loadSound('img/sound_cue.mp3');
        soundBuffers.hit = await loadSound('img/sound_hit.mp3');
        audioLoaded = true;
        document.getElementById("game-state").innerText = "✅ 音效載入完成！";
        document.getElementById("grill-btn").innerText = "開始聽示範";
    } catch (error) {
        console.error("音效載入失敗，改用電子音備援方案", error);
        audioLoaded = false;
        document.getElementById("game-state").innerText = "⚠️ 找不到音效，已用模擬音效替代";
        document.getElementById("grill-btn").innerText = "開始聽示範";
    }
}

function playSound(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    if (audioLoaded && soundBuffers[type]) {
        const source = audioCtx.createBufferSource();
        source.buffer = soundBuffers[type];
        source.connect(audioCtx.destination);
        source.start(0);
    } else {
        if (type === 'spawn') playTone(330, 0.12);
        if (type === 'cue') playTone(880, 0.2);
        if (type === 'hit') playTone(523, 0.08);
    }
}

function playTone(freq, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function resetGrillVisuals() {
    for(let i=0; i<4; i++) {
        const m = document.getElementById(`meat-${i}`);
        m.style.display = 'none';
        m.style.backgroundImage = 'none';
        document.getElementById(`tongs-${i}`).style.display = 'none';
        document.getElementById(`tongs-${i}`).style.backgroundImage = 'none';
    }
    document.getElementById("kid-img").src = "img/kid_idle.png";
}

function resetGame() {
    currentLevelIdx = 0;
    score = 0;
    isPlaying = false;
    isListening = false;
    missedCheckTimers.forEach(t => clearTimeout(t));
    missedCheckTimers = [];
    document.getElementById("total-score").innerText = "0";
    document.getElementById("level-title").innerText = levels[0].name;
    document.getElementById("game-state").innerText = "準備烤肉...";
    document.getElementById("rating-display").innerText = "";
    resetGrillVisuals();
    document.getElementById("grill-btn").disabled = false;
    document.getElementById("grill-btn").innerText = audioCtx ? "開始聽示範" : "初始化音效";
}

function startGameLoop() {
    if (!audioCtx) {
        initAudioEngine();
        return;
    }
    if (isPlaying) return;
    
    resetGrillVisuals();
    missedCheckTimers.forEach(t => clearTimeout(t));
    missedCheckTimers = [];
    
    const lvl = levels[currentLevelIdx];
    beatDuration = 60 / lvl.bpm;
    
    document.getElementById("level-title").innerText = lvl.name;
    document.getElementById("game-state").innerText = "👂 聆聽示範放肉...";
    document.getElementById("game-state").style.color = "#ffbe76";
    document.getElementById("grill-btn").disabled = true;
    
    isPlaying = true;
    isListening = true;
    playerClicksCount = 0;
    targetTimestamps = [];

    lvl.pattern.forEach((beat, i) => {
        setTimeout(() => {
            playSound('spawn'); 
            const targetMeat = document.getElementById(`meat-${i}`);
            targetMeat.style.backgroundImage = `url('${lvl.imgRaw}')`; 
            targetMeat.style.display = 'flex';
            targetMeat.classList.add('active-pulse');
            setTimeout(() => targetMeat.classList.remove('active-pulse'), 150);
        }, beat * beatDuration * 1000);
    });

    setTimeout(() => {
        document.getElementById("game-state").innerText = "🙌 嗨 ── ！！";
        document.getElementById("game-state").style.color = "#f1c40f";
        document.getElementById("kid-img").src = "img/kid_surprise.png";
        playSound('cue'); 
    }, 5 * beatDuration * 1000);

    lvl.pattern.forEach((beat) => {
        targetTimestamps.push((beat - 1) * beatDuration * 1000);
    });

    setTimeout(() => {
        isListening = false;
        document.getElementById("game-state").innerText = "🔥 順著剛才的節奏夾起來！";
        document.getElementById("game-state").style.color = "#2ecc71";
        document.getElementById("grill-btn").disabled = false;
        document.getElementById("grill-btn").innerText = "🥢 夾肉！";
        
        startTime = performance.now();

        lvl.pattern.forEach((beat, idx) => {
            const targetTime = (beat - 1) * beatDuration * 1000;
            const timer = setTimeout(() => {
                const m = document.getElementById(`meat-${idx}`);
                if (m.style.display !== 'none' && playerClicksCount <= idx) {
                    m.style.backgroundImage = `url('${lvl.imgBurnt}')`; 
                    triggerMissOverdue(idx);
                }
            }, targetTime + 350); 
            missedCheckTimers.push(timer);
        });

    }, 6 * beatDuration * 1000);
}

function triggerMissOverdue(idx) {
    playerClicksCount = Math.max(playerClicksCount, idx + 1);
    updateKidImg(0); 
    if (playerClicksCount === levels[currentLevelIdx].pattern.length) endLevel();
}

function handleInput() {
    if (isListening || !isPlaying) return;
    
    const clickTime = performance.now() - startTime;
    playerClicksCount++;
    
    const lvl = levels[currentLevelIdx];
    if (playerClicksCount > lvl.pattern.length) return;
    
    const meatIndex = playerClicksCount - 1;
    const targetTime = targetTimestamps[meatIndex];
    const diff = clickTime - targetTime; 
    const absDiff = Math.abs(diff);
    
    let rating = "Miss";
    let points = 0;
    let finalImg = lvl.imgBurnt; 

    if (absDiff <= 100) {
        rating = "Excellent";
        points = 300;
        finalImg = lvl.imgCooked; 
    } else if (absDiff <= 220) {
        rating = "Great";
        points = 100;
        finalImg = lvl.imgCooked; 
    } else {
        if (diff < 0) {
            rating = "Good";
            points = 50;
            finalImg = lvl.imgRaw; 
        } else {
            rating = "Miss";
            points = 0;
            finalImg = lvl.imgBurnt; 
        }
    }

    document.getElementById(`meat-${meatIndex}`).style.display = 'none';

    const targetTongs = document.getElementById(`tongs-${meatIndex}`);
    targetTongs.style.backgroundImage = `url('${finalImg}')`; 
    targetTongs.style.display = 'flex';

    score += points;
    document.getElementById("total-score").innerText = score;
    
    updateKidImg(points);

    // 🛠️ 這裡已經修改：把括號和 ms 誤差拿掉，只顯示單純判定文字（例如 "Excellent"）
    const ratingDisplay = document.getElementById("rating-display");
    ratingDisplay.innerText = rating;
    ratingDisplay.className = rating;
    
    playSound('hit'); 

    if (playerClicksCount === lvl.pattern.length) {
        endLevel();
    }
}

function updateKidImg(points) {
    const kidImg = document.getElementById("kid-img");
    if (points === 300) {
        kidImg.src = "img/kid_excellent.png";
    } else if (points === 100) {
        kidImg.src = "img/kid_great.png";
    } else if (points === 50) {
        kidImg.src = "img/kid_good.png";
    } else {
        kidImg.src = "img/kid_miss.png";
    }
}

function endLevel() {
    isPlaying = false;
    missedCheckTimers.forEach(t => clearTimeout(t));
    const mainBtn = document.getElementById("grill-btn");
    mainBtn.disabled = false;
    mainBtn.innerText = "下一關";
    
    if (currentLevelIdx < levels.length - 1) {
        document.getElementById("game-state").innerText = "🎉 本關結束！準備下一關！";
        document.getElementById("game-state").style.color = "#3498db";
        currentLevelIdx++;
    } else {
        document.getElementById("game-state").innerText = "🏆 恭喜通關中秋夯霸！";
        document.getElementById("game-state").style.color = "#9b59b6";
        mainBtn.disabled = true;
    }
}

const mainBtn = document.getElementById("grill-btn");
const restartBtn = document.getElementById("restart-btn");

mainBtn.addEventListener('click', function(e) {
    if (!audioCtx) initAudioEngine();
    else if (!isPlaying) startGameLoop();
    else if (!isListening) handleInput();
});
restartBtn.addEventListener('click', resetGame);

window.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
        e.preventDefault();
        if (!audioCtx) initAudioEngine();
        else if (!isListening && isPlaying) handleInput();
        else if (!isPlaying && currentLevelIdx < levels.length) startGameLoop();
    }
});
</script>

</body>
</html>
